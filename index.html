<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Sistema de Inventário de Livros</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- 🔷 TOPO DO SITE -->
    <header style="background-color:#2c3e50; color:white; padding:15px; text-align:center; position:relative;">

        <h2>Biblioteca</h2>

        <!-- � BOTÃO CADASTROS -->
        <a href="usuarios.html" id="btnCadastros" style="position:absolute; right:190px; top:15px;">
            <button style="padding:8px 15px; cursor:pointer;">Cadastros</button>
        </a>

        <!-- �🔐 BOTÃO LOGIN -->
        <a href="login.html" id="btnLogin" style="position:absolute; right:100px; top:15px;">
            <button style="padding:8px 15px; cursor:pointer;">Login</button>
        </a>

        <!-- 🚪 BOTÃO SAIR -->
        <button onclick="logout()" id="btnSair"
            style="position:absolute; right:20px; top:15px; padding:8px 15px; cursor:pointer;">
            Sair
        </button>

    </header>

    <!-- 🔷 BANNER -->
    <div class="banner">
        <img src="https://images.unsplash.com/photo-1507842217343-583bb7270b66" alt="Biblioteca">
    </div>

    <!-- 🔷 TÍTULO -->
    <section class="titulo-pagina">
        <h1>Sistema de Inventário de Livros</h1>
        <p>Gerencie o cadastro, status e localização dos livros da biblioteca</p>
    </section>

    <!-- 🔷 CONTEÚDO -->
    <div class="container">

        <form id="formLivro">

            <h2>Cadastrar Livro</h2>

            <label>Título</label>
            <input type="text" id="titulo" required>

            <label>Ano</label>
            <input type="text" id="ano" maxlength="4" placeholder="Ex: 2026" required>

            <label>Quantidade</label>
            <input type="number" id="quantidade" required>

            <label>Categoria</label>
            <select id="categoria" required>
                <option value="">Selecione uma categoria...</option>
            </select>

            <label>Autor</label>
            <select id="autor" required>
                <option value="">Selecione um autor...</option>
            </select>

            <!-- <label>Localização</label>
            <input type="text" id="localizacao" placeholder="Ex: Estante A1">

            <label>Status</label>
            <select id="status">
                <option>Disponível</option>
                <option>Emprestado</option>
                <option>Manutenção</option>
            </select> -->

            <button type="submit">Cadastrar Livro</button>

        </form>

        <table id="tabelaLivros">

            <thead>
                <tr>
                    <th>Título</th>
                    <th>Ano</th>
                    <th>Quantidade</th>
                    <th>Categoria</th>
                    <th>Autor</th>
                </tr>
            </thead>

            <tbody>
            </tbody>

        </table>

    </div>

    <script>
        const API_URL = "https://sistema-inventario-livros.onrender.com/livros";

        if (localStorage.getItem("logado") !== "true") {
            window.location.href = "login.html";
        }

        let logado = localStorage.getItem("logado");

        if (logado === "true") {
            document.getElementById("btnLogin").style.display = "none";
        } else {
            document.getElementById("btnSair").style.display = "none";
        }

        function logout() {
            localStorage.removeItem("logado");
            window.location.href = "login.html";
        }

        document.getElementById("formLivro").addEventListener("submit", async function (e) {
            e.preventDefault();

            const livro = {
                titulo: document.getElementById("titulo").value,
                ano: document.getElementById("ano").value,
                quantidade: parseInt(document.getElementById("quantidade").value),
                categoria: { categoriaId: parseInt(document.getElementById("categoria").value) },
                autor: { pessoaId: parseInt(document.getElementById("autor").value) }
            };

            console.log("Livro a ser cadastrado:", livro);  

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(livro)
                });

                if (response.ok) {
                    alert("Livro cadastrado com sucesso!");
                    document.getElementById("formLivro").reset();
                    carregarLivros();
                } else {
                    alert("Erro ao cadastrar livro");
                }

            } catch (error) {
                console.error(error);
                alert("Erro ao conectar com o servidor");
            }
        });


        async function carregarLivros() {
            try {
                const response = await fetch(API_URL);
                const livros = await response.json();

                const tabela = document.querySelector("#tabelaLivros tbody");
                tabela.innerHTML = "";

                livros.forEach(livro => {
                    const linha = `
                    <tr>
                        <td>${livro.titulo}</td>
                        <td>${livro.ano}</td>
                        <td>${livro.quantidade}</td>
                        <td>${livro.categoria ? livro.categoria.descricao : ''}</td>
                        <td>${livro.autor ? livro.autor.nome : ''}</td>
                    </tr>
                `;
                    tabela.innerHTML += linha;
                });

            } catch (error) {
                console.error(error);
            }
        }

        async function carregarCategorias() {
            try {
                const response = await fetch("https://sistema-inventario-livros.onrender.com/categoria");
                const categorias = await response.json();
                const selectCategoria = document.getElementById("categoria");
                
                categorias.forEach(cat => {
                    const option = document.createElement("option");
                    option.value = cat.categoriaId;  // <-- usando a propriedade correta
                    option.textContent = cat.descricao;
                    selectCategoria.appendChild(option);
                });
            } catch (error) {
                console.error("Erro ao carregar categorias", error);
            }
        }

        async function carregarAutores() {
            try {
                const response = await fetch("https://sistema-inventario-livros.onrender.com/pessoas");
                const autores = await response.json();
                const selectAutor = document.getElementById("autor");
                
                autores.forEach(autor => {
                    const option = document.createElement("option");
                    option.value = autor.pessoaId; // <-- usando a propriedade correta
                    option.textContent = autor.nome;
                    selectAutor.appendChild(option);
                });
            } catch (error) {
                console.error("Erro ao carregar autores", error);
            }
        }

        window.onload = () => {
            carregarCategorias();
            carregarAutores();
            carregarLivros();
        };
    </script>

</body>

</html>
