<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Sistema de Inventário de Livros</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🔷 TOPO DO SITE -->
<header style="background-color:#2c3e50; color:white; padding:15px; text-align:center; position:relative;">

    <h2>Biblioteca</h2>

    <!-- 🔐 BOTÃO LOGIN -->
    <a href="login.html" id="btnLogin" style="position:absolute; right:100px; top:15px;">
        <button style="padding:8px 15px; cursor:pointer;">Login</button>
    </a>

    <!-- 🚪 BOTÃO SAIR -->
    <button onclick="logout()" id="btnSair" style="position:absolute; right:20px; top:15px; padding:8px 15px; cursor:pointer;">
        Sair
    </button>

</header>

<!-- 🔷 BANNER -->
<div class="banner">
    <img src="https://images.unsplash.com/photo-1507842217343-583bb7270b66" alt="Biblioteca">
</div>

<!-- 🔷 TÍTULO -->
<section class="titulo-pagina">
    <h1>Sistema de Inventário de Livros</h1>
    <p>Gerencie o cadastro, status e localização dos livros da biblioteca</p>
</section>

<!-- 🔷 CONTEÚDO -->
<div class="container">

    <form id="formLivro">

        <h2>Cadastrar Livro</h2>

        <label>Título</label>
        <input type="text" id="titulo" required>

        <label>Autor</label>
        <input type="text" id="autor" required>

        <label>Data de Aquisição</label>
        <input type="date" id="data" required>

        <label>Localização</label>
        <input type="text" id="localizacao" placeholder="Ex: Estante A1">

        <label>Status</label>
        <select id="status">
            <option>Disponível</option>
            <option>Emprestado</option>
            <option>Manutenção</option>
        </select>

        <button type="submit">Cadastrar Livro</button>

    </form>

    <table id="tabelaLivros">

        <thead>
        <tr>
            <th>Título</th>
            <th>Autor</th>
            <th>Data</th>
            <th>Localização</th>
            <th>Status</th>
        </tr>
        </thead>

        <tbody>
        </tbody>

    </table>

</div>

<script src="script.js"></script>

<script>
    let logado = localStorage.getItem("logado");

    if (logado === "true") {
        document.getElementById("btnLogin").style.display = "none";
    } else {
        document.getElementById("btnSair").style.display = "none";
    }

    function logout() {
        localStorage.removeItem("logado");
        window.location.href = "login.html";
    }
</script>

</body>
</html>
