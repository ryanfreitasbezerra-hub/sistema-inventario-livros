<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="login.css">
</head>

<body class="login-page">

    <div class="login-box">
        <h2>Login</h2>

        <input type="email" id="email" placeholder="Email">
        <input type="password" id="senha" placeholder="Senha">

        <button type="button" onclick="entrar()">Entrar</button>

        <a href="cadastro.html">Cadastrar Usuário</a>

        <p id="mensagem"></p>
    </div>

    <script>
        const API_URL = "https://sistema-inventario-livros.onrender.com";

        async function entrar() {
            let email = document.getElementById("email").value.trim();
            let senha = document.getElementById("senha").value.trim();
            let msg = document.getElementById("mensagem");

            if (email === "" || senha === "") {
                msg.innerText = "Preencha os campos.";
                msg.style.color = "red";
                return;
            }

            try {
                let logado = localStorage.getItem("logado");
                let emailSalvo = localStorage.getItem("email");
                let senhaSalva = localStorage.getItem("senha");

                if (logado === "true" && email === emailSalvo && senha === senhaSalva) {
                    msg.innerText = "Login realizado!";
                    msg.style.color = "green";

                    setTimeout(() => {
                        window.location.href = "index.html";
                    }, 1000);
                }

                const response = await fetch(API_URL + "/auth/login", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        email: email,
                        senha: senha
                    })
                });

                if (response.ok) {
                    localStorage.setItem("logado", "true");
                    localStorage.setItem("email", email);
                    localStorage.setItem("senha", senha);

                    msg.innerText = "Login realizado!";
                    msg.style.color = "green";

                    setTimeout(() => {
                        window.location.href = "index.html";
                    }, 1000);
                } else {
                    msg.innerText = "Email ou senha inválidos.";
                    msg.style.color = "red";
                }
            } catch (e) {
                console.log(e);

                msg.innerText = "Erro ao conectar com o servidor.";
                msg.style.color = "red";
            }
        }
    </script>

</body>

</html>
